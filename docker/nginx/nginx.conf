# Ensure temporary paths are in /tmp
# (mime.types já carregado pelo nginx.conf principal — não incluir novamente)
client_body_temp_path /tmp/client_temp;
proxy_temp_path       /tmp/proxy_temp_path;
fastcgi_temp_path     /tmp/fastcgi_temp_path;
uwsgi_temp_path       /tmp/uwsgi_temp_path;
scgi_temp_path        /tmp/scgi_temp_path;

server {
    listen 8080;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;
    location / {
        try_files $uri $uri/ /index.html;
    }
}