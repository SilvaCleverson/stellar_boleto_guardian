server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compressão gzip para assets estáticos
    gzip on;
    gzip_types text/html text/css application/javascript image/svg+xml;
    gzip_min_length 1024;

    # Proxy de todas as rotas /api/* para o container Node.js.
    # Nenhuma chave administrativa é injetada aqui: o backend (api:3000)
    # absorve a responsabilidade e lê ADMIN_API_KEY do próprio .env.
    location /api/ {
        proxy_pass         http://api:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # Arquivos estáticos: tenta o arquivo exato, depois com .html, depois 404
    location / {
        try_files $uri $uri.html $uri/ =404;
    }

    # Cache de assets (logos, SVGs, etc.)
    location ~* \.(svg|png|jpg|ico|css|js)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    server_tokens off;
}
