services:

  # ── Container Node.js: API backend ──────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: boleto-guardian-api
    expose:
      - "3000"
    env_file:
      - ./backend/.env
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    networks:
      - guardian-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  # ── Container nginx: frontend estático + proxy ──────────────────────────────
  # ADMIN_API_KEY é lido do mesmo backend/.env e injetado no template via
  # envsubst (NGINX_ENVSUBST_FILTER=^ADMIN_API_KEY$). Assim, o nginx adiciona
  # automaticamente o header x-admin-key nas rotas /api/blockchain e /api/admin/*
  # e o frontend NÃO precisa mais conhecer ou enviar a chave administrativa.
  web:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
    container_name: boleto-guardian-web
    ports:
      - "80:80"
    env_file:
      - ./backend/.env
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - guardian-net

networks:
  guardian-net:
    driver: bridge
