# =============================================================================
# Pré-requisitos no VPS antes do `docker compose up -d`:
#
#   1. docker network create proxy
#   2. mkdir -p ~/DockerConfig/traefik/{logs,letsencrypt}
#   3. touch ~/DockerConfig/traefik/letsencrypt/acme.json
#      chmod 600 ~/DockerConfig/traefik/letsencrypt/acme.json
#   4. cp docker/traefik/traefik_dynamic.toml ~/DockerConfig/traefik/
#   5. Editar backend/.env com COMPANY_ACCOUNT, COMPANY_SECRET, ADMIN_API_KEY
#   6. DNS apontando *.guardian-labs.xyz para o IP do VPS
#
# IMPORTANTE: este compose NÃO usa o Docker provider do Traefik
# (incompatibilidade do SDK com Docker Engine 29.x). Todas as rotas estão
# declaradas no traefik_dynamic.toml. Containers não precisam de labels.
# =============================================================================

networks:
  default:
    external: true
    name: proxy

volumes:
  portainer-data:

services:

  # ── Traefik: reverse proxy + TLS automático (config estática) ──────────────
  traefik:
    container_name: traefik
    image: "traefik:v3.3"
    restart: always
    command:
      - --api.dashboard=true
      - --api.insecure=false
      # Provider de arquivo: lê /traefik_dynamic.toml para rotas/serviços
      - --providers.file.filename=/traefik_dynamic.toml
      - --providers.file.watch=true
      # Provider Docker DESABILITADO (incompatível com Docker Engine 29.x)
      - --log.level=INFO
      - --log.filePath=/logs/traefik.log
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --entrypoints.console.address=:8080
      # Let's Encrypt
      - --certificatesresolvers.le.acme.email=guardianlabsw3@gmail.com
      - --certificatesresolvers.le.acme.storage=/letsencrypt/acme.json
      - --certificatesresolvers.le.acme.httpchallenge=true
      - --certificatesresolvers.le.acme.httpchallenge.entrypoint=web
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    volumes:
      # Socket Docker NÃO é mais montado — provider Docker desativado
      - "/home/artero/DockerConfig/traefik/traefik_dynamic.toml:/traefik_dynamic.toml:ro"
      - "/home/artero/DockerConfig/traefik/logs:/logs"
      - "/home/artero/DockerConfig/traefik/letsencrypt:/letsencrypt"

  # ── Portainer ──────────────────────────────────────────────────────────────
  portainer:
    image: portainer/portainer-ce
    container_name: portainer
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer-data:/data
    depends_on:
      - traefik

  # ── Boleto Guardian: API Node ──────────────────────────────────────────────
  guardian-labs-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: guardian-labs-api
    restart: unless-stopped
    expose:
      - "3000"
    env_file:
      - ./backend/.env
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    depends_on:
      - traefik

  # ── Boleto Guardian: Portal nginx (estático) ───────────────────────────────
  guardian-labs-portal:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
    container_name: guardian-labs-portal
    restart: unless-stopped
    expose:
      - "8080"
    depends_on:
      traefik:
        condition: service_started
      guardian-labs-api:
        condition: service_healthy
